sonar.projectKey=HamzaMami_opentowork
sonar.organization=hamzamami
sonar.host.url=https://sonarcloud.io

# Source and Test paths
sonar.sources=backend,frontend/src
sonar.tests=backend/tests,frontend/src/__tests__

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage report paths (Updated for MERN structure)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Exclusions (Don't analyze library code or build files)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,backend/uploads/**
