name: OpenToWork CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for SonarQube analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # --- BACKEND VALIDATION ---
      - name: Install Backend Dependencies
        run: cd backend && npm install

      - name: Run Backend Tests
        run: cd backend && npm test

      # --- FRONTEND VALIDATION ---
      - name: Install Frontend Dependencies
        run: cd frontend && npm install

      - name: Run Frontend Tests
        run: cd frontend && npm test

      - name: Validate SonarCloud Configuration
        run: |
          if [ -z "${{ vars.SONAR_PROJECT_KEY }}" ]; then
            echo "Missing repository variable: SONAR_PROJECT_KEY"
            exit 1
          fi
          if [ -z "${{ vars.SONAR_ORGANIZATION }}" ]; then
            echo "Missing repository variable: SONAR_ORGANIZATION"
            exit 1
          fi

      # --- DEVSECOPS: SONARQUBE ANALYSIS  ---
      - name: SonarCloud Scan
        continue-on-error: true
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dproject.settings=.github/workflows/sonar-project.properties
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # --- DEVSECOPS: DOCKER & TRIVY SCAN  ---
      - name: Build Backend Image
        run: docker build -t opentowork-backend:${{ github.sha }} -f docker/backend/Dockerfile .

      - name: Trivy Security Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'opentowork-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Fails the pipeline if "Critical" vulnerabilities are found
          severity: 'CRITICAL,HIGH'
